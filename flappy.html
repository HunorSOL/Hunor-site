<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Flap</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="flappy.css">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="flappy-body">

    <a href="index.html" class="back-btn" style="position: absolute; top: 20px; left: 20px; z-index: 100;">← Back to Hub</a>
    
    <div id="game-container">
        <!-- Live Score -->
        <div id="score-display">0</div>
        
        <!-- Game Over Screen -->
        <div id="game-over" class="overlay hidden">
            <h1 class="glow-text" style="color: #ef4444;">CRASHED</h1>
            <h2 id="final-score">Score: 0</h2>
            <h3 id="best-score" style="color: #94a3b8;">Best: 0</h3>
            <button class="open-btn" onclick="startGame()" style="margin-top: 2rem;">TRY AGAIN</button>
        </div>
        
        <!-- Start Screen -->
        <div id="start-screen" class="overlay">
            <h1 class="glow-text" style="color: #06b6d4; font-size: 4rem;">NEON FLAP</h1>
            <p style="color: #94a3b8; font-size: 1.5rem; margin-bottom: 2rem;">Press SPACE or CLICK to flap</p>
            <button class="open-btn" onclick="startGame()">START</button>
        </div>
        
        <canvas id="flappyCanvas"></canvas>
    </div>

    <script src="flappy.js"></script>
</body>
</html>
