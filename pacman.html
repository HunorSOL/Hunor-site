<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pacman Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="pacman.css">
</head>
<body>
    <nav class="top-bar">
        <a href="index.html" class="btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="m15 18-6-6 6-6"/>
            </svg>
            Back to Home
        </a>
    </nav>
    <main class="game-container">
        <div class="game-header">
            <h2>Score: <span id="score">0</span></h2>
            <div class="difficulty-selector" style="display: flex; align-items: center; gap: 0.5rem; margin-left: auto; margin-right: 1rem;">
                <label for="difficulty" style="font-weight: 600;">Difficulty:</label>
                <select id="difficulty" class="btn" style="padding: 0.3rem 0.8rem; font-size: 0.9rem; background: rgba(15, 23, 42, 0.8); color: white; border: 1px solid var(--btn-border);">
                    <option value="easy">Easy</option>
                    <option value="normal" selected>Normal</option>
                    <option value="hard">Hard</option>
                </select>
            </div>
            <div id="game-over" class="hidden">You lost - <button id="restart-btn" class="btn primary-btn" style="margin-top: 0; padding: 0.4rem 1rem; font-size: 0.9rem;">Start Again</button></div>
            <div id="game-win" class="hidden">Congratulations! - <button id="restart-win-btn" class="btn primary-btn" style="margin-top: 0; padding: 0.4rem 1rem; font-size: 0.9rem;">Play Again</button></div>
        </div>
        <canvas id="gameCanvas" width="570" height="570"></canvas>
    </main>
    <script src="pacman.js"></script>
</body>
</html>
